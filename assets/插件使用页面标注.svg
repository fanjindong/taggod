<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .page-title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .page-subtitle { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526071; }
      .popup-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .section-title { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #697386; }
      .tiny { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8a94a6; }
      .button { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .callout-title { font: 700 20px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f5f59; }
      .callout-body { font: 400 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #31524f; }
      .num { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .kbd { font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #445066; }
    </style>
  </defs>

  <rect width="1080" height="760" fill="#eef2f7"/>
  <text x="48" y="54" class="page-title">标签之神使用页面</text>
  <text x="48" y="84" class="page-subtitle">只做两件事：一键理顺满屏标签，快速找回想看的页面。</text>

  <g id="popup" transform="translate(64 118)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="572" rx="18" fill="#ffffff" stroke="#dfe5ef"/>

    <text x="16" y="34" class="popup-title">快速切换</text>
    <text x="16" y="58" class="small">最近使用页面</text>
    <text x="16" y="78" class="tiny">默认打开</text>
    <rect x="70" y="64" width="50" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="79" y="78" class="kbd">⌘⇧L</text>
    <text x="128" y="78" class="tiny">/</text>
    <rect x="140" y="64" width="86" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="150" y="78" class="kbd">Ctrl Shift L</text>

    <text x="16" y="116" class="label">搜索已打开标签</text>
    <rect x="16" y="126" width="388" height="38" rx="10" fill="#ffffff" stroke="#d8dee9"/>
    <text x="30" y="151" class="label">github</text>
    <text x="16" y="188" class="tiny">点击打开</text>
    <line x1="75" y1="177" x2="75" y2="190" stroke="#d8dee9"/>
    <rect x="86" y="172" width="30" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="94" y="186" class="kbd">↑↓</text>
    <text x="122" y="188" class="tiny">选择</text>
    <rect x="154" y="172" width="44" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="164" y="186" class="kbd">Enter</text>
    <text x="206" y="188" class="tiny">跳转</text>

    <text x="16" y="220" class="small">86 个标签 · 4 个窗口</text>

    <line x1="16" y1="242" x2="404" y2="242" stroke="#d8dee9"/>
    <text x="16" y="267" class="section-title">搜索结果</text>
    <text x="346" y="267" class="small">3 个结果</text>
    <rect x="16" y="282" width="388" height="58" rx="10" fill="#eff6ff" stroke="#1f6feb"/>
    <text x="28" y="305" class="label">tabgod · GitHub</text>
    <text x="28" y="324" class="small">github · https://github.com/example/tabgod</text>
    <text x="314" y="313" class="tiny">当前窗口 · 刚刚</text>
    <rect x="16" y="348" width="388" height="58" rx="10" fill="#ffffff" stroke="#d8dee9"/>
    <text x="28" y="371" class="label">Issues · 标签整理优化</text>
    <text x="28" y="390" class="small">github · https://github.com/example/tabgod/issues</text>
    <text x="302" y="379" class="tiny">其他窗口 · 8 分钟前</text>
    <rect x="16" y="414" width="388" height="58" rx="10" fill="#ffffff" stroke="#d8dee9"/>
    <text x="28" y="437" class="label">Pull requests · 文档改进</text>
    <text x="28" y="456" class="small">github · https://github.com/example/tabgod/pulls</text>
    <text x="302" y="445" class="tiny">其他窗口 · 1 小时前</text>

    <rect x="16" y="492" width="260" height="36" rx="8" fill="#1f6feb" stroke="#1f6feb"/>
    <text x="105" y="515" class="button" fill="#ffffff">整理当前窗口</text>
    <rect x="288" y="492" width="116" height="36" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="322" y="515" class="button" fill="#172033">更多工具</text>
    <text x="16" y="550" class="tiny">默认快捷键</text>
    <rect x="86" y="535" width="52" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="95" y="549" class="kbd">⌘⇧Y</text>
    <text x="146" y="550" class="tiny">/</text>
    <rect x="158" y="535" width="86" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="168" y="549" class="kbd">Ctrl Shift Y</text>
  </g>

  <g id="badges" transform="translate(64 118)">
    <circle cx="388" cy="145" r="16" fill="#0f766e"/>
    <text x="383" y="151" class="num">1</text>
    <circle cx="388" cy="318" r="16" fill="#0f766e"/>
    <text x="383" y="324" class="num">2</text>
    <circle cx="262" cy="510" r="16" fill="#0f766e"/>
    <text x="257" y="516" class="num">3</text>
  </g>

  <g id="callouts">
    <path d="M536 266 L456 263" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="202" width="430" height="126" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="202" r="17" fill="#0f766e"/>
    <text x="543" y="208" class="num">1</text>
    <text x="578" y="236" class="callout-title">快速找回想看的页面</text>
    <text x="578" y="268" class="callout-body">打开弹窗后直接输入标题、网址或主域名。</text>
    <text x="578" y="294" class="callout-body">不输入内容时，先看最近使用页面。</text>

    <path d="M536 420 L456 432" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="366" width="430" height="112" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="366" r="17" fill="#0f766e"/>
    <text x="543" y="372" class="num">2</text>
    <text x="578" y="400" class="callout-title">点击或键盘跳转</text>
    <text x="578" y="432" class="callout-body">点击结果即可切换，也可以用方向键选择后</text>
    <text x="578" y="458" class="callout-body">按 Enter 跳到目标页面。</text>

    <path d="M536 610 L338 626" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="546" width="430" height="126" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="546" r="17" fill="#0f766e"/>
    <text x="543" y="552" class="num">3</text>
    <text x="578" y="580" class="callout-title">一键理顺满屏标签</text>
    <text x="578" y="612" class="callout-body">点击“整理当前窗口”，把同一网站的页面</text>
    <text x="578" y="638" class="callout-body">归到一起，让标签栏重新变得可读。</text>
  </g>

  <text x="64" y="724" class="small">示例数据用于说明界面位置，实际内容来自你当前打开的标签页。</text>
</svg>
