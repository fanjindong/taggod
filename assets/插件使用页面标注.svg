<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="760" viewBox="0 0 1080 760">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#0f766e"/>
    </marker>
    <style>
      .page-title { font: 700 34px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .page-subtitle { font: 400 17px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #526071; }
      .popup-title { font: 700 22px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .section-title { font: 700 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .label { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #172033; }
      .small { font: 400 12px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #697386; }
      .tiny { font: 400 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #8a94a6; }
      .button { font: 500 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .button-strong { font: 700 15px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .callout-title { font: 700 19px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #0f5f59; }
      .callout-body { font: 400 14px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #31524f; }
      .num { font: 700 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #ffffff; }
      .kbd { font: 500 11px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #445066; }
    </style>
  </defs>

  <rect width="1080" height="760" fill="#eef2f7"/>
  <text x="48" y="54" class="page-title">标签之神使用页面</text>
  <text x="48" y="84" class="page-subtitle">搜索快速切换、一键整理和分组规则共同支撑大量标签页管理。</text>

  <g id="popup" transform="translate(64 100)" filter="url(#shadow)">
    <rect x="0" y="0" width="420" height="648" rx="18" fill="#ffffff" stroke="#dfe5ef"/>

    <text x="16" y="34" class="popup-title">一键整理</text>
    <text x="16" y="58" class="small">搜索切换，或一键整理当前窗口</text>
    <text x="16" y="78" class="tiny">打开弹窗</text>
    <rect x="74" y="64" width="50" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="83" y="78" class="kbd">⌘⇧L</text>
    <text x="132" y="78" class="tiny">/</text>
    <rect x="144" y="64" width="86" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="154" y="78" class="kbd">Ctrl Shift L</text>

    <text x="16" y="116" class="label">搜索已打开标签</text>
    <rect x="16" y="128" width="388" height="36" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="28" y="151" class="small">输入标题、网址或分组名</text>
    <text x="16" y="184" class="tiny">点击打开</text>
    <circle cx="82" cy="180" r="2" fill="#c2cad8"/>
    <rect x="94" y="171" width="38" height="18" rx="5" fill="#f8fafd" stroke="#c2cad8"/>
    <text x="102" y="184" class="kbd">↑↓</text>
    <text x="140" y="184" class="tiny">选择</text>
    <rect x="178" y="171" width="48" height="18" rx="5" fill="#f8fafd" stroke="#c2cad8"/>
    <text x="188" y="184" class="kbd">回车</text>
    <text x="234" y="184" class="tiny">跳转</text>

    <text x="16" y="220" class="small">86 个标签 · 3 个窗口</text>
    <text x="322" y="220" class="small">6 个重复</text>

    <text x="16" y="258" class="section-title">最近使用</text>
    <text x="336" y="258" class="small">30 个结果</text>
    <rect x="16" y="272" width="388" height="54" rx="8" fill="#eef5ff" stroke="#1f6feb"/>
    <text x="28" y="294" class="label">项目 A 仓库</text>
    <text x="28" y="313" class="small">项目 A · https://github.com/my-org/project-a</text>
    <text x="318" y="304" class="small">其他窗口</text>
    <rect x="16" y="334" width="388" height="54" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="28" y="356" class="label">设计文档</text>
    <text x="28" y="375" class="small">docs · https://docs.example.com/design</text>
    <text x="319" y="366" class="small">5 分钟前</text>

    <rect x="16" y="416" width="388" height="44" rx="8" fill="#1f6feb" stroke="#1f6feb"/>
    <text x="164" y="444" class="button-strong" fill="#ffffff">整理当前窗口</text>

    <rect x="16" y="472" width="188" height="36" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="82" y="495" class="button" fill="#172033">智能去重</text>
    <rect x="216" y="472" width="188" height="36" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="282" y="495" class="button" fill="#172033">保存工作集</text>

    <text x="16" y="536" class="tiny">默认快捷键</text>
    <rect x="86" y="521" width="52" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="95" y="535" class="kbd">⌘⇧Y</text>
    <text x="146" y="536" class="tiny">/</text>
    <rect x="158" y="521" width="86" height="20" rx="5" fill="#ffffff" stroke="#c2cad8"/>
    <text x="168" y="535" class="kbd">Ctrl Shift Y</text>
    <rect x="310" y="516" width="94" height="30" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="334" y="536" class="button" fill="#172033">高级管理</text>

    <line x1="16" y1="562" x2="404" y2="562" stroke="#d8dee9"/>
    <text x="16" y="590" class="section-title">分组规则</text>
    <rect x="304" y="570" width="100" height="30" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="321" y="590" class="button" fill="#172033">新增规则</text>
    <rect x="16" y="608" width="388" height="34" rx="8" fill="#ffffff" stroke="#d8dee9"/>
    <text x="28" y="629" class="label">项目 A</text>
    <text x="92" y="629" class="small">域名包含 github.com · 归入项目 A</text>
  </g>

  <g id="badges" transform="translate(64 100)">
    <circle cx="388" cy="146" r="16" fill="#0f766e"/>
    <text x="383" y="152" class="num">1</text>
    <circle cx="388" cy="299" r="16" fill="#0f766e"/>
    <text x="383" y="305" class="num">2</text>
    <circle cx="388" cy="438" r="16" fill="#0f766e"/>
    <text x="383" y="444" class="num">3</text>
    <circle cx="430" cy="625" r="16" fill="#0f766e"/>
    <text x="425" y="631" class="num">4</text>
  </g>

  <g id="callouts">
    <path d="M536 190 L468 246" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="144" width="430" height="108" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="144" r="17" fill="#0f766e"/>
    <text x="543" y="150" class="num">1</text>
    <text x="578" y="176" class="callout-title">搜索已打开标签</text>
    <text x="578" y="206" class="callout-body">标题、网址、主域名和自定义分组名</text>
    <text x="578" y="230" class="callout-body">都能匹配，打开弹窗即可输入。</text>

    <path d="M536 316 L456 392" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="282" width="430" height="112" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="282" r="17" fill="#0f766e"/>
    <text x="543" y="288" class="num">2</text>
    <text x="578" y="314" class="callout-title">最近使用与键盘选择</text>
    <text x="578" y="344" class="callout-body">未输入时展示最近页面；方向键选择，</text>
    <text x="578" y="368" class="callout-body">回车跳转，跨窗口会先聚焦目标窗口。</text>

    <path d="M536 470 L456 538" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="424" width="430" height="108" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="424" r="17" fill="#0f766e"/>
    <text x="543" y="430" class="num">3</text>
    <text x="578" y="456" class="callout-title">一键整理当前窗口</text>
    <text x="578" y="486" class="callout-body">搜索不影响整理主路径，当前窗口仍可</text>
    <text x="578" y="510" class="callout-body">一键按规则归拢、分组和排序。</text>

    <path d="M536 604 L456 725" stroke="#0f766e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
    <rect x="548" y="562" width="430" height="112" rx="14" fill="#ecfdf5" stroke="#99d8cf"/>
    <circle cx="548" cy="562" r="17" fill="#0f766e"/>
    <text x="543" y="568" class="num">4</text>
    <text x="578" y="594" class="callout-title">分组规则是核心能力</text>
    <text x="578" y="624" class="callout-body">规则按顺序匹配，可用条件组表达</text>
    <text x="578" y="648" class="callout-body">满足全部或满足任一，并指定目标分组。</text>
  </g>

  <text x="64" y="756" class="small">示例数据用于说明界面位置，实际内容来自你当前打开的标签页。</text>
</svg>
