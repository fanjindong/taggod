<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>标签之神</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="popup-shell">
      <header class="popup-header">
        <div>
          <h1>一键整理</h1>
          <p id="summaryText">把当前窗口整理成清晰分组</p>
          <p class="helper-text popup-shortcut-helper">
            <span>打开弹窗</span>
            <kbd>⌘⇧L</kbd>
            <span>/</span>
            <kbd>Ctrl Shift L</kbd>
          </p>
        </div>
      </header>

      <section class="quick-status" aria-label="标签概览">
        <span id="quickStatusText">正在读取标签页</span>
        <span id="duplicateHintText"></span>
      </section>

      <section class="quick-action-area" aria-label="常用操作">
        <div class="action-grid quick-action-grid">
          <button id="organizeButton" class="primary-action" type="button">整理当前窗口</button>
          <button id="moreToolsButton" type="button" aria-expanded="false" aria-controls="moreToolsSection">更多工具</button>
        </div>
        <p class="helper-text action-helper-text">
          <span>默认快捷键</span>
          <kbd>⌘⇧Y</kbd>
          <span>/</span>
          <kbd>Ctrl Shift Y</kbd>
        </p>
      </section>

      <section id="moreToolsSection" class="more-tools-section is-hidden" aria-label="更多工具" hidden>
        <section class="settings-strip" aria-label="整理设置">
          <label class="setting-field" for="minTabsPerGroupInput">
            <span>分组阈值</span>
            <input id="minTabsPerGroupInput" type="number" min="1" step="1" inputmode="numeric">
          </label>
          <span class="setting-unit">个标签</span>
          <button id="saveGroupThresholdButton" class="compact-button" type="button">保存</button>
        </section>

        <section id="duplicateReviewSection" class="list-section is-hidden" aria-label="重复标签确认" hidden>
          <div class="section-title">
            <h2>重复确认</h2>
            <span id="duplicateReviewCount">0 个可关闭</span>
          </div>
          <div id="duplicateReviewList" class="duplicate-review-list"></div>
          <div class="review-actions">
            <button id="closeSelectedDuplicatesButton" class="danger-button" type="button">关闭已勾选重复标签</button>
            <button id="cancelDuplicateReviewButton" type="button">取消</button>
          </div>
        </section>

        <section class="list-section">
          <div class="section-title">
            <h2>管理操作</h2>
          </div>
          <p class="helper-text section-helper-text">智能去重会先确认，不会直接关闭。</p>
          <div class="tool-button-grid">
            <button id="scanDuplicatesButton" type="button">智能去重</button>
            <button id="saveWorkspaceButton" type="button">保存工作集</button>
          </div>
        </section>

        <section class="list-section">
          <div class="section-title">
            <h2>优先分组</h2>
          </div>
          <div id="groupList" class="group-list"></div>
        </section>

        <section class="list-section">
          <div class="section-title">
            <h2>工作集</h2>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>
      </section>

      <p id="statusText" class="status-text" role="status"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
